name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without leading v, e.g. 1.0.0). Used only for manual runs.'
        required: true
        default: '0.0.0-dev'

jobs:
  release:
    name: build & publish release
    runs-on: windows-latest
    permissions:
      contents: write   # required by softprops/action-gh-release to create the Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
            $tag = '${{ github.ref_name }}'
            $version = $tag -replace '^v', ''
          } else {
            $tag = 'v${{ github.event.inputs.version }}'
            $version = '${{ github.event.inputs.version }}'
          }
          Write-Host "tag=$tag, version=$version"
          "tag=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore RobloxAltManager.slnx

      - name: Run publish script
        shell: pwsh
        run: ./scripts/publish.ps1 -Version "${{ steps.ver.outputs.version }}"

      - name: List release artifacts
        shell: pwsh
        run: Get-ChildItem release | Format-Table Name, Length

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/RAM-Fork-v${{ steps.ver.outputs.version }}-x64.exe
            release/RAM-Fork-v${{ steps.ver.outputs.version }}-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
